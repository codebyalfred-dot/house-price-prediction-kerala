services:
  backend:
    build:
      context: ./backend
    container_name: kerala-house-price-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models

  frontend:
    build:
      context: ./frontend
    container_name: kerala-house-price-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

